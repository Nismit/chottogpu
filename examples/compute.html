<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chottoGPU — Compute Shader Particles</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas></canvas>
<script type="module">
import { chottoGPU } from '../chottoGPU.js';

const NUM_PARTICLES = 10000;

// Compute shader: update particle positions
const computeWGSL = /* wgsl */`
struct Particle {
  pos: vec2f,
  vel: vec2f,
};

struct Params {
  deltaTime: f32,
  time: f32,
};

@group(0) @binding(0) var<storage, read_write> particles: array<Particle>;
@group(0) @binding(1) var<uniform> u: Params;

@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) id: vec3u) {
  let i = id.x;
  if (i >= ${NUM_PARTICLES}u) { return; }

  var p = particles[i];

  // Attract to center with some swirl
  let toCenter = -p.pos;
  let dist = length(toCenter);
  let attract = toCenter / (dist + 0.1) * 0.5;

  // Swirl force
  let swirl = vec2f(-toCenter.y, toCenter.x) * 0.3;

  // Noise-like variation based on position and time
  let noise = vec2f(
    sin(p.pos.x * 3.0 + u.time * 2.0) * 0.2,
    cos(p.pos.y * 3.0 + u.time * 1.5) * 0.2
  );

  p.vel += (attract + swirl + noise) * u.deltaTime;
  p.vel *= 0.99; // damping
  p.pos += p.vel * u.deltaTime;

  // Wrap around edges
  if (p.pos.x < -1.5) { p.pos.x += 3.0; }
  if (p.pos.x > 1.5) { p.pos.x -= 3.0; }
  if (p.pos.y < -1.5) { p.pos.y += 3.0; }
  if (p.pos.y > 1.5) { p.pos.y -= 3.0; }

  particles[i] = p;
}`;

// Vertex shader: read particle positions from storage buffer
const vertexWGSL = /* wgsl */`
struct Particle {
  pos: vec2f,
  vel: vec2f,
};

struct Uniforms {
  resolution: vec2f,
};

@group(0) @binding(0) var<storage, read> particles: array<Particle>;
@group(0) @binding(1) var<uniform> u: Uniforms;

struct VOut {
  @builtin(position) position: vec4f,
  @location(0) speed: f32,
};

@vertex fn vs(@builtin(vertex_index) vi: u32) -> VOut {
  let p = particles[vi];
  let aspect = u.resolution.x / u.resolution.y;
  var out: VOut;
  out.position = vec4f(p.pos.x / aspect, p.pos.y, 0.0, 1.0);
  out.speed = length(p.vel);
  return out;
}

@fragment fn fs(@location(0) speed: f32) -> @location(0) vec4f {
  let t = clamp(speed * 2.0, 0.0, 1.0);
  let col = mix(vec3f(0.2, 0.5, 1.0), vec3f(1.0, 0.3, 0.5), t);
  return vec4f(col, 1.0);
}`;

const canvas = document.querySelector('canvas');
const gpu = await chottoGPU(canvas);
gpu.fitWindow();

// Initialize particles with random positions and velocities
const particleData = new Float32Array(NUM_PARTICLES * 4);
for (let i = 0; i < NUM_PARTICLES; i++) {
  const angle = Math.random() * Math.PI * 2;
  const radius = Math.random() * 1.2;
  particleData[i * 4 + 0] = Math.cos(angle) * radius; // pos.x
  particleData[i * 4 + 1] = Math.sin(angle) * radius; // pos.y
  particleData[i * 4 + 2] = (Math.random() - 0.5) * 0.5; // vel.x
  particleData[i * 4 + 3] = (Math.random() - 0.5) * 0.5; // vel.y
}

const particleBuffer = gpu.buffer(particleData, { storage: true });
const computeUBO = gpu.buffer(new Float32Array(4), { uniform: true });
const renderUBO = gpu.buffer(new Float32Array(4), { uniform: true });

// Compute pipeline
const computePipe = gpu.compute({ shader: computeWGSL });
const computeBG = gpu.device.createBindGroup({
  layout: computePipe.getBindGroupLayout(0),
  entries: [
    { binding: 0, resource: { buffer: particleBuffer.buffer } },
    { binding: 1, resource: { buffer: computeUBO.buffer } },
  ],
});

// Render pipeline (points)
const renderPipe = gpu.pipeline({
  vertex: vertexWGSL,
  fragment: vertexWGSL,
  topology: 'point-list',
});
const renderBG = gpu.device.createBindGroup({
  layout: renderPipe.getBindGroupLayout(0),
  entries: [
    { binding: 0, resource: { buffer: particleBuffer.buffer } },
    { binding: 1, resource: { buffer: renderUBO.buffer } },
  ],
});

let lastTime = performance.now();

(function render() {
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  computeUBO.write(new Float32Array([dt, now * 0.001, 0, 0]));
  renderUBO.write(new Float32Array([canvas.width, canvas.height, 0, 0]));

  gpu.frame(() => {
    // Compute pass: update particles
    gpu.dispatch((p) => {
      p.setPipeline(computePipe);
      p.setBindGroup(0, computeBG);
      p.dispatchWorkgroups(Math.ceil(NUM_PARTICLES / 64));
    });

    // Render pass: draw particles as points
    gpu.pass((p) => {
      p.setPipeline(renderPipe);
      p.setBindGroup(0, renderBG);
      p.draw(NUM_PARTICLES);
    });
  });

  requestAnimationFrame(render);
})();
</script>
</body>
</html>
